# ============================================================
# Pylon FH3X – Home Assistant Modbus TCP configuratie
# Ref: ModBus-Protocol-Pylon-FH3X-V1.2 + werkend ha-solarman profiel
#
# Voeg toe aan configuration.yaml:
#   modbus: !include pylon_fh3x_modbus.yaml
#
# BELANGRIJK: FH3X gebruikt FC03 (holding registers) voor ALLES,
# ook de 30xxx registers. Gebruik daarom input_type: holding overal.
#
# Slave 2 = omvormer (30xxx / 40xxx)
# Slave 1 = BMS (0x1xxx)
#
# Adressen zijn 1-based (documentadres direct gebruiken, geen aftrek)
# ============================================================

- name: pylon_fh3x
  type: tcp
  host: 192.168.178.xxx
  port: 502
  timeout: 3
  delay: 30
  retry_on_empty: true
  close_comm_on_error: true
  message_wait_milliseconds: 100

  sensors:

    # ---- Omvormer status ----------------------------------------
    - name: "FH3X Omvormer Status"
      unique_id: "pylon_fh3x_fh3x_omvormer_status"
      slave: 2
      address: 30115
      input_type: holding
      data_type: uint16
      scan_interval: 15

    # ---- PV -------------------------------------------------------
    - name: "PV1 Spanning"
      unique_id: "pylon_fh3x_pv1_spanning"
      slave: 2
      address: 30119
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      scan_interval: 5

    - name: "PV1 Stroom"
      unique_id: "pylon_fh3x_pv1_stroom"
      slave: 2
      address: 30120
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      scan_interval: 5

    - name: "PV2 Spanning"
      unique_id: "pylon_fh3x_pv2_spanning"
      slave: 2
      address: 30121
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      scan_interval: 5

    - name: "PV2 Stroom"
      unique_id: "pylon_fh3x_pv2_stroom"
      slave: 2
      address: 30122
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      scan_interval: 5

    - name: "PV3 Spanning"
      unique_id: "pylon_fh3x_pv3_spanning"
      slave: 2
      address: 30123
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      scan_interval: 5

    - name: "PV3 Stroom"
      unique_id: "pylon_fh3x_pv3_stroom"
      slave: 2
      address: 30124
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      scan_interval: 5

    - name: "PV Totaalvermogen"
      unique_id: "pylon_fh3x_pv_totaalvermogen"
      slave: 2
      address: 30127
      input_type: holding
      data_type: int32
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      scan_interval: 5

    - name: "PV Totale Energie"
      unique_id: "pylon_fh3x_pv_totale_energie"
      slave: 2
      address: 30129
      input_type: holding
      data_type: float32
      precision: 1
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      scan_interval: 60

    # ---- Net -------------------------------------------------------
    - name: "Netspanning R"
      unique_id: "pylon_fh3x_netspanning_r"
      slave: 2
      address: 30131
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      scan_interval: 5

    - name: "Netspanning S"
      unique_id: "pylon_fh3x_netspanning_s"
      slave: 2
      address: 30133
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      scan_interval: 5

    - name: "Netspanning T"
      unique_id: "pylon_fh3x_netspanning_t"
      slave: 2
      address: 30135
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      scan_interval: 5

    - name: "Batterijstroom R" #uit batterij
      unique_id: "pylon_fh3x_batterijstroom_r"
      slave: 2
      address: 30132
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      scan_interval: 5

    - name: "Batterijstroom S" #uit batterij
      unique_id: "pylon_fh3x_batterijstroom_s"
      slave: 2
      address: 30134
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      scan_interval: 5

    - name: "Batterijstroom T" #uit batterij
      unique_id: "pylon_fh3x_batterijstroom_t"
      slave: 2
      address: 30136
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      scan_interval: 5

    - name: "CT Netstroom T" 
      unique_id: "pylon_fh3x_netstroom_t"
      slave: 2
      address: 30185
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      scan_interval: 5

    - name: "CT Netstroom S" #uit batterij
      unique_id: "pylon_fh3x_netstroom_s"
      slave: 2
      address: 30184
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      scan_interval: 5

    - name: "CT Netstroom R" #uit batterij
      unique_id: "pylon_fh3x_netstroom_r"
      slave: 2
      address: 30183
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      scan_interval: 5

    - name: "AC Frequentie"
      unique_id: "pylon_fh3x_ac_frequentie"
      slave: 2
      address: 30140
      input_type: holding
      data_type: uint16
      scale: 0.01
      precision: 2
      unit_of_measurement: "Hz"
      device_class: frequency
      state_class: measurement
      scan_interval: 10

    - name: "Netvermogen Totaal"
      unique_id: "pylon_fh3x_netvermogen_totaal"
      slave: 2
      address: 30108
      input_type: holding
      data_type: int32
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      scan_interval: 5

    - name: "AC Totaalvermogen"
      unique_id: "pylon_fh3x_ac_totaalvermogen"
      slave: 2
      address: 30100
      input_type: holding
      data_type: int32
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      scan_interval: 5

    - name: "Totaal Net Afname"
      unique_id: "pylon_fh3x_totaal_net_afname"
      slave: 2
      address: 30156
      input_type: holding
      data_type: float32
      precision: 1
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      scan_interval: 60

    - name: "Totaal Net Teruglevering"
      unique_id: "pylon_fh3x_totaal_net_teruglevering"
      slave: 2
      address: 30158
      input_type: holding
      data_type: float32
      precision: 1
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      scan_interval: 60

    # ---- Accu (omvormer kant) ------------------------------------
    - name: "Accu Status"
      unique_id: "pylon_fh3x_accu_status"
      slave: 2
      address: 30161
      input_type: holding
      data_type: uint16
      scan_interval: 15
      # 0=Sleep, 1=Laden, 2=Ontladen

    - name: "Accu Vermogen"
      unique_id: "pylon_fh3x_accu_vermogen"
      slave: 2
      address: 30162
      input_type: holding
      data_type: int32
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      scan_interval: 5

    - name: "Accu Spanning"
      unique_id: "pylon_fh3x_accu_spanning"
      slave: 2
      address: 30164
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      scan_interval: 5

    - name: "Accu Stroom"
      unique_id: "pylon_fh3x_accu_stroom"
      slave: 2
      address: 30165
      input_type: holding
      data_type: int16
      scale: 0.1
      precision: 1
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      scan_interval: 5

    - name: "Accu SOC"
      unique_id: "pylon_fh3x_accu_soc"
      slave: 2
      address: 30182
      input_type: holding
      data_type: uint16
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement
      scan_interval: 10

    - name: "Totaal Accu Geladen"
      unique_id: "pylon_fh3x_totaal_accu_geladen"
      slave: 2
      address: 30174
      input_type: holding
      data_type: float32
      precision: 1
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      scan_interval: 60

    - name: "Totaal Accu Ontladen"
      unique_id: "pylon_fh3x_totaal_accu_ontladen"
      slave: 2
      address: 30176
      input_type: holding
      data_type: float32
      precision: 1
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      scan_interval: 60

    # ---- Temperatuur & foutcodes ---------------------------------
    - name: "Omvormer Temperatuur"
      unique_id: "pylon_fh3x_omvormer_temperatuur"
      slave: 2
      address: 30146
      input_type: holding
      data_type: int16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      scan_interval: 30

    - name: "Foutcode"
      unique_id: "pylon_fh3x_foutcode"
      slave: 2
      address: 30148
      input_type: holding
      data_type: uint32
      scan_interval: 30

    - name: "Waarschuwingscode"
      unique_id: "pylon_fh3x_waarschuwingscode"
      slave: 2
      address: 30150
      input_type: holding
      data_type: uint32
      scan_interval: 30

    # ---- BMS – Slave 1 -------------------------------------------
    - name: "BMS SOC"
      unique_id: "pylon_fh3x_bms_soc"
      slave: 1
      address: 0x1407
      input_type: holding
      data_type: uint16
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement
      scan_interval: 10

    - name: "BMS Spanning"
      unique_id: "pylon_fh3x_bms_spanning"
      slave: 1
      address: 0x1403
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      scan_interval: 5

    - name: "BMS Temperatuur"
      unique_id: "pylon_fh3x_bms_temperatuur"
      slave: 1
      address: 0x1406
      input_type: holding
      data_type: int16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      scan_interval: 30

    - name: "BMS SOH"
      unique_id: "pylon_fh3x_bms_soh"
      slave: 1
      address: 0x1420
      input_type: holding
      data_type: uint16
      unit_of_measurement: "%"
      state_class: measurement
      scan_interval: 60

    - name: "BMS Celspanning Max"
      unique_id: "pylon_fh3x_bms_celspanning_max"
      slave: 1
      address: 0x1410
      input_type: holding
      data_type: uint16
      scale: 0.001
      precision: 3
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      scan_interval: 30

    - name: "BMS Celspanning Min"
      unique_id: "pylon_fh3x_bms_celspanning_min"
      slave: 1
      address: 0x1411
      input_type: holding
      data_type: uint16
      scale: 0.001
      precision: 3
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      scan_interval: 30

    - name: "BMS Cycli"
      unique_id: "pylon_fh3x_bms_cycli"
      slave: 1
      address: 0x1408
      input_type: holding
      data_type: uint16
      state_class: total_increasing
      scan_interval: 60

  # ---- SELECT – EMS Modus --------------------------------------
  selects:
    - name: "EMS Modus"
      unique_id: "pylon_fh3x_ems_modus"
      slave: 2
      address: 40907
      scan_interval: 30
      options:
        - { option: "Self-Consumption", value: 0 }
        - { option: "Backup",           value: 1 }
        - { option: "Off-Grid",         value: 2 }
        - { option: "Feed-in Priority", value: 3 }
        - { option: "User Mode",        value: 4 }
        - { option: "PN-Customer",      value: 5 }

  # ---- NUMBER – Laad/ontlaadvermogen ---------------------------
  numbers:
    - name: "Laad/Ontlaad Vermogen"
      unique_id: "pylon_fh3x_laad_ontlaad_vermogen"
      slave: 2
      address: 40901
      data_type: int16
      min_value: -1000
      max_value: 1000
      step: 1
      scan_interval: 30